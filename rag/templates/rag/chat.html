<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeNest Policy Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card shadow-sm border-0 rounded-4">

                <!-- Header -->
                <div class="card-header bg-success text-white rounded-top-4">
                    <h4 class="mb-1">SafeNest Policy Assistant</h4>
                    <small>Ask questions about company policies</small>
                </div>

                <!-- Chat Body -->
                <div class="card-body" id="chatBody" style="height: 500px; overflow-y: auto;">

                    <!-- Initial Message -->
                    <div class="d-flex mb-3">
                        <div class="bg-light p-3 rounded-3">
                            Hello 👋 I can help you with SafeNest policies.
                        </div>
                    </div>

                </div>

                <!-- Footer -->
                <div class="card-footer bg-white">
                    <form id="chatForm" class="row g-2">

                        <div class="col-9">
                            <input
                                type="text"
                                id="queryInput"
                                class="form-control form-control-lg"
                                placeholder="Type your question..."
                                required
                            >
                        </div>

                        <div class="col-3 d-grid">
                            <button class="btn btn-primary btn-lg">
                                Send
                            </button>
                        </div>

                    </form>

                    <div id="loadingText" class="text-muted mt-2 d-none">
                        Thinking...
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
    const chatForm = document.getElementById("chatForm");
    const queryInput = document.getElementById("queryInput");
    const chatBody = document.getElementById("chatBody");
    const loadingText = document.getElementById("loadingText");

    function addMessage(sender, text, citations = []) {
        const wrapper = document.createElement("div");

        wrapper.className = sender === "user"
            ? "d-flex justify-content-end mb-3"
            : "d-flex justify-content-start mb-3";

        const bubble = document.createElement("div");

        bubble.className = sender === "user"
            ? "bg-primary text-white p-3 rounded-3"
            : "bg-light p-3 rounded-3";

        bubble.textContent = text;

        wrapper.appendChild(bubble);

        // Add citations for bot
        if (sender === "bot" && citations.length > 0) {
            const citationDiv = document.createElement("div");
            citationDiv.className = "small text-muted mt-1";

            const citationText = citations
                .map(c => `${c.title}`)
                .join(", ");

            citationDiv.textContent = `Source: ${citationText}`;
            wrapper.appendChild(citationDiv);
        }

        chatBody.appendChild(wrapper);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    chatForm.addEventListener("submit", async function(e) {
        e.preventDefault();

        const query = queryInput.value.trim();
        if (!query) return;

        addMessage("user", query);
        queryInput.value = "";

        loadingText.classList.remove("d-none");

        try {
            const response = await fetch("/api/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ query: query })
            });

            const data = await response.json();

            if (data.error) {
                addMessage("bot", data.error);
            } else {
                addMessage("bot", data.answer, data.citations);
            }

        } catch (error) {
            addMessage("bot", "An error occurred. Please try again.");
        }

        loadingText.classList.add("d-none");
    });
</script>

</body>
</html>
